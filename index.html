<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marketing Miashop — Agenda</title>
<style>
  :root{
    --ink:#1a1626;
    --paper:#faf8f4;
    --panel:#ffffff;
    --line:#e6e1d8;
    --muted:#8a8296;
    --brand:#ea6c12;
    --brand-soft:#fdecdc;
    --brand-ink:#c2560a;
    --shadow:0 1px 2px rgba(26,22,38,.04),0 8px 24px rgba(26,22,38,.06);
    --shadow-lg:0 20px 60px rgba(26,22,38,.18);

    /* status/cores dos dias */
    --c-livre:#0891b2;      --c-livre-bg:#d9f2f7;
    --c-trabalho:#ca9a04;   --c-trabalho-bg:#fbf3d3;
    --c-limite:#dc2626;     --c-limite-bg:#fbe5e5;
    --c-postado:#16a34a;    --c-postado-bg:#e2f5e9;
    --c-feriado:#7c3aed;    --c-feriado-bg:#efe6fd;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--paper);color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  input,select,textarea{font-family:inherit;font-size:14px}

  /* ---------- Topbar ---------- */
  .topbar{
    display:flex;align-items:center;gap:16px;flex-wrap:wrap;
    padding:16px 24px;background:var(--panel);border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:40;
  }
  .brand{display:flex;align-items:center;gap:16px}
  .brand-logo{
    height:44px;width:auto;border-radius:6px;display:block
  }
  .brand-txt{border-left:2px solid var(--line);padding-left:14px}
  .brand h1{font-size:17px;font-weight:700;letter-spacing:-.2px}
  .brand p{font-size:12px;color:var(--muted);margin-top:1px}

  .nav{display:flex;align-items:center;gap:6px;margin-left:auto}
  .nav-btn{
    width:38px;height:38px;border-radius:10px;background:var(--paper);
    border:1px solid var(--line);display:grid;place-items:center;font-size:16px;
    transition:.15s;color:var(--ink)
  }
  .nav-btn:hover{background:var(--brand-soft);border-color:var(--brand-soft)}
  .month-label{font-size:16px;font-weight:700;min-width:170px;text-align:center;text-transform:capitalize}
  .today-btn{
    padding:9px 15px;border-radius:10px;background:var(--paper);border:1px solid var(--line);
    font-size:13px;font-weight:600;transition:.15s
  }
  .today-btn:hover{background:var(--brand-soft)}
  .add-btn{
    padding:10px 17px;border-radius:11px;background:var(--brand);color:#fff;
    font-size:14px;font-weight:600;display:flex;align-items:center;gap:7px;
    box-shadow:var(--shadow);transition:.15s
  }
  .add-btn:hover{background:var(--brand-ink)}

  /* ---------- Legend ---------- */
  .legend{
    display:flex;gap:8px;flex-wrap:wrap;padding:12px 24px;background:var(--panel);
    border-bottom:1px solid var(--line);align-items:center
  }
  .legend-title{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-right:4px}
  .legend-note{font-size:11px;color:var(--muted);font-style:italic;flex-basis:100%;margin-top:2px}
  .chip{
    display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:20px;
    font-size:12px;font-weight:600;
  }
  .dot{width:9px;height:9px;border-radius:50%}
  .chip.livre{background:var(--c-livre-bg);color:var(--c-livre)} .chip.livre .dot{background:var(--c-livre)}
  .chip.trabalho{background:var(--c-trabalho-bg);color:var(--c-trabalho)} .chip.trabalho .dot{background:var(--c-trabalho)}
  .chip.limite{background:var(--c-limite-bg);color:var(--c-limite)} .chip.limite .dot{background:var(--c-limite)}
  .chip.postado{background:var(--c-postado-bg);color:var(--c-postado)} .chip.postado .dot{background:var(--c-postado)}
  .chip.feriado{background:var(--c-feriado-bg);color:var(--c-feriado)} .chip.feriado .dot{background:var(--c-feriado)}

  /* ---------- Calendar ---------- */
  .cal-wrap{padding:20px 24px 40px;max-width:1400px;margin:0 auto}
  .weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:8px}
  .weekday{text-align:center;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:4px}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
  .cell{
    min-height:132px;background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:8px;display:flex;flex-direction:column;gap:5px;transition:.15s;position:relative;overflow:hidden
  }
  .cell:hover{border-color:var(--brand);box-shadow:var(--shadow)}
  .cell.out{background:transparent;border-color:transparent}
  .cell.out .daynum{color:#c9c3ba}
  .cell.out:hover{box-shadow:none;border-color:transparent}
  .cell.marked::before{
    content:"";position:absolute;inset:0;opacity:.7;pointer-events:none;z-index:0
  }
  .cell.m-livre::before{background:var(--c-livre-bg)}
  .cell.m-trabalho::before{background:var(--c-trabalho-bg)}
  .cell.m-limite::before{background:var(--c-limite-bg)}
  .cell.m-postado::before{background:var(--c-postado-bg)}
  .cell.m-feriado::before{background:var(--c-feriado-bg)}
  .cell.marked{border-color:transparent}
  .cell.m-livre{border-left:3px solid var(--c-livre)}
  .cell.m-trabalho{border-left:3px solid var(--c-trabalho)}
  .cell.m-limite{border-left:3px solid var(--c-limite)}
  .cell.m-postado{border-left:3px solid var(--c-postado)}
  .cell.m-feriado{border-left:3px solid var(--c-feriado)}

  .cell-head{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
  .daynum{font-size:14px;font-weight:700}
  .cell.today .daynum{
    background:var(--brand);color:#fff;width:26px;height:26px;border-radius:50%;
    display:grid;place-items:center;font-size:13px
  }
  .cell-actions{display:flex;gap:3px;opacity:0;transition:.15s}
  .cell:hover .cell-actions{opacity:1}
  .mini-btn{width:22px;height:22px;border-radius:6px;display:grid;place-items:center;font-size:12px;background:var(--paper);border:1px solid var(--line);color:var(--muted)}
  .mini-btn:hover{background:var(--brand-soft);color:var(--brand)}

  .events{display:flex;flex-direction:column;gap:4px;position:relative;z-index:1;overflow:hidden}
  .ev{
    font-size:11px;font-weight:600;padding:4px 7px;border-radius:7px;
    display:flex;align-items:center;gap:5px;line-height:1.25;text-align:left;width:100%;
    background:var(--brand-soft);color:var(--brand-ink);transition:.12s
  }
  .ev:hover{transform:translateX(2px)}
  .ev .ev-icon{font-size:12px;flex-shrink:0}
  .ev .ev-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ev.type-limite{background:var(--c-limite-bg);color:var(--c-limite)}
  .ev.type-trabalho{background:var(--c-trabalho-bg);color:var(--c-trabalho)}
  .ev.type-postado{background:var(--c-postado-bg);color:var(--c-postado)}
  .ev-more{font-size:10px;color:var(--muted);font-weight:600;padding-left:4px}

  /* card grande: 1 projeto ocupando o dia inteiro */
  .big-ev{
    flex:1;width:100%;position:relative;z-index:1;border:none;border-radius:10px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
    padding:6px 6px 8px;text-align:center;cursor:pointer;transition:.15s;background:transparent
  }
  .big-ev:hover{transform:scale(1.02)}
  .big-ev-icon{font-size:26px;line-height:1;display:inline-flex;align-items:center;gap:3px;flex-wrap:wrap;justify-content:center}
  .big-ev-title{
    font-size:13px;font-weight:800;line-height:1.15;color:var(--ink);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    max-width:100%
  }
  .big-ev-type{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .big-flag{
    font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;margin-top:2px;
    display:inline-flex;align-items:center;gap:3px
  }
  .big-ev-extras{font-size:11px;font-weight:600;color:var(--muted);margin-top:1px}
  .big-ev.is-producao .big-flag{background:var(--c-trabalho);color:#fff}
  .big-ev.is-postado .big-flag{background:var(--c-postado);color:#fff}
  .big-ev.is-atraso .big-flag{background:var(--c-limite);color:#fff}
  .big-ev.is-postado .big-ev-title{color:var(--c-postado)}
  .big-ev.is-atraso .big-ev-title{color:var(--c-limite)}

  /* status badge no evento */
  .ev-badges{display:flex;gap:2px;margin-left:auto;flex-shrink:0}
  .ev-badge{font-size:9px}

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(26,22,38,.45);backdrop-filter:blur(3px);
    display:none;align-items:center;justify-content:center;z-index:100;padding:20px
  }
  .overlay.show{display:flex}
  .modal{
    background:var(--panel);border-radius:20px;box-shadow:var(--shadow-lg);
    width:100%;max-width:560px;max-height:90vh;overflow-y:auto;
    animation:pop .2s ease
  }
  @keyframes pop{from{transform:scale(.96);opacity:0}to{transform:scale(1);opacity:1}}
  .modal-head{
    padding:20px 24px;border-bottom:1px solid var(--line);display:flex;
    align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--panel);z-index:2;border-radius:20px 20px 0 0
  }
  .modal-head h2{font-size:17px;font-weight:700;display:flex;align-items:center;gap:9px}
  .modal-head .date-sub{font-size:13px;color:var(--muted);font-weight:500}
  .close-x{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-size:18px;color:var(--muted);background:var(--paper)}
  .close-x:hover{background:var(--c-limite-bg);color:var(--c-limite)}
  .modal-body{padding:20px 24px}

  .field{margin-bottom:12px}
  .field label{display:block;font-size:12px;font-weight:700;margin-bottom:5px;color:var(--ink)}
  .field label .opt{color:var(--muted);font-weight:500;font-size:11px}
  .field input[type=text],.field input[type=date],.field select,.field textarea{
    width:100%;padding:8px 11px;border:1px solid var(--line);border-radius:9px;
    background:var(--paper);transition:.15s
  }
  .field input:focus,.field select:focus,.field textarea:focus{
    outline:none;border-color:var(--brand);background:#fff;box-shadow:0 0 0 3px var(--brand-soft)
  }
  .field textarea{resize:vertical;min-height:60px}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  /* type selector - chips compactos em linha */
  .type-pick{display:flex;gap:6px;flex-wrap:wrap}
  .type-opt{
    padding:6px 11px;border:1px solid var(--line);border-radius:20px;
    background:var(--paper);font-size:12px;font-weight:600;transition:.15s;
    display:inline-flex;align-items:center;gap:5px;white-space:nowrap
  }
  .type-opt .tico{font-size:14px;display:inline-flex;align-items:center}
  .type-img{border-radius:4px;object-fit:cover;vertical-align:middle;display:inline-block}
  .big-ev-icon .type-img{border-radius:6px;margin:0 1px}
  .detail-ev-icon .type-img{border-radius:5px}
  .type-opt.active{border-color:var(--brand);background:var(--brand-soft);color:var(--brand-ink);font-weight:700}
  .type-opt .type-check{font-size:11px;font-weight:800;color:var(--brand)}
  .type-opt.type-new{border-style:dashed;color:var(--brand);background:var(--brand-soft)}

  .prod-field{margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
  .prod-label{font-size:13px !important;color:var(--brand-ink) !important}

  /* produtos - lista compacta em linha */
  .prod-list{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
  .prod-list-head{
    display:grid;grid-template-columns:34px 1fr 90px 120px 30px 30px;gap:6px;align-items:center;
    padding:0 4px 4px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px
  }
  .prod-row{
    display:grid;grid-template-columns:34px 1fr 90px 120px 30px 30px;gap:6px;align-items:center;
    padding:5px;border:1px solid var(--line);border-radius:9px;background:var(--paper)
  }
  .prod-row input[type=text]{
    padding:7px 9px;border:1px solid var(--line);border-radius:7px;background:#fff;font-size:13px;min-width:0;transition:.12s
  }
  .prod-row input[type=text]:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 2px var(--brand-soft)}
  .prod-thumb{
    width:34px;height:34px;border-radius:7px;border:1px dashed var(--line);flex-shrink:0;
    display:grid;place-items:center;overflow:hidden;background:#fff;cursor:pointer;padding:0
  }
  .prod-thumb img{width:100%;height:100%;object-fit:cover}
  .prod-thumb .ph{font-size:14px;color:var(--muted)}
  .p-note-btn,.prod-del{
    width:30px;height:30px;border-radius:7px;display:grid;place-items:center;background:#fff;
    border:1px solid var(--line);color:var(--muted);font-size:13px;cursor:pointer;transition:.12s
  }
  .p-note-btn:hover{background:var(--brand-soft);color:var(--brand)}
  .p-note-btn.has-note{background:var(--brand-soft);color:var(--brand);border-color:var(--brand)}
  .prod-del:hover{background:var(--c-limite-bg);color:var(--c-limite)}
  .prod-notes{
    grid-column:1 / -1;width:100%;margin-top:2px;padding:8px 10px;border:1px solid var(--line);border-radius:8px;
    background:#fff;resize:vertical;min-height:42px;font-size:13px;transition:.15s
  }
  .prod-notes:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 2px var(--brand-soft)}
  .add-prod{
    width:100%;padding:11px;border:1px dashed var(--brand);border-radius:11px;
    background:var(--brand-soft);color:var(--brand-ink);font-size:13px;font-weight:600;
    display:flex;align-items:center;justify-content:center;gap:7px;transition:.15s
  }
  .add-prod:hover{background:var(--brand);color:#fff}

  /* anexo */
  .attach-zone{
    border:1px dashed var(--line);border-radius:12px;padding:14px;background:var(--paper);
    display:flex;align-items:center;gap:12px;cursor:pointer;transition:.15s
  }
  .attach-zone:hover{border-color:var(--brand);background:var(--brand-soft)}
  .attach-ico{width:42px;height:42px;border-radius:10px;background:#fff;border:1px solid var(--line);display:grid;place-items:center;font-size:19px;flex-shrink:0}
  .attach-txt strong{display:block;font-size:13px}
  .attach-txt small{font-size:11px;color:var(--muted)}
  .attach-file{display:flex;align-items:center;gap:8px;margin-top:8px;padding:8px 11px;background:var(--brand-soft);border-radius:9px;font-size:12px;font-weight:600;color:var(--brand-ink)}
  .attach-file .rm{margin-left:auto;color:var(--c-limite);cursor:pointer;font-weight:700}

  .modal-foot{
    padding:16px 24px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:space-between;
    position:sticky;bottom:0;background:var(--panel);border-radius:0 0 20px 20px
  }
  .btn{padding:11px 18px;border-radius:11px;font-size:14px;font-weight:600;transition:.15s}
  .btn-primary{background:var(--brand);color:#fff;box-shadow:var(--shadow)}
  .btn-primary:hover{background:var(--brand-ink)}
  .btn-ghost{background:var(--paper);border:1px solid var(--line);color:var(--ink)}
  .btn-ghost:hover{background:var(--brand-soft)}
  .btn-danger{background:var(--c-limite-bg);color:var(--c-limite)}
  .btn-danger:hover{background:var(--c-limite);color:#fff}

  /* ---------- Detail view (dentro do modal) ---------- */
  .detail-ev{border:1px solid var(--line);border-radius:13px;padding:14px;margin-bottom:12px;position:relative}
  .detail-ev-head{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px}
  .detail-ev-icon{min-width:38px;height:38px;padding:0 8px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;gap:3px;font-size:18px;flex-shrink:0;background:var(--brand-soft)}
  .detail-ev-title{font-size:15px;font-weight:700;line-height:1.3}
  .detail-meta{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
  .meta-tag{font-size:11px;font-weight:600;padding:4px 9px;border-radius:7px;background:var(--paper);border:1px solid var(--line);display:flex;align-items:center;gap:5px}
  .detail-prods{display:flex;flex-direction:column;gap:8px;margin-top:10px}
  .dp{display:flex;flex-direction:column;gap:8px;padding:8px;background:var(--paper);border-radius:10px}
  .dp-top{display:flex;gap:10px;align-items:center}
  .dp img,.dp .dp-ph{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--brand-soft);display:grid;place-items:center;font-size:17px;color:var(--brand)}
  .dp-info strong{font-size:13px;display:block}
  .dp-info small{font-size:11px;color:var(--muted)}
  .dp-notes{font-size:12px;color:var(--ink);line-height:1.5;background:#fff;border:1px solid var(--line);border-radius:8px;padding:7px 10px}
  .ev-notes{font-size:13px;color:var(--ink);line-height:1.5;background:var(--brand-soft);border-radius:9px;padding:9px 12px;margin:8px 0}
  .detail-actions{display:flex;gap:8px;margin-top:12px}
  .detail-actions .btn{padding:8px 14px;font-size:13px}
  .empty-day{text-align:center;padding:30px 10px;color:var(--muted)}
  .empty-day .big{font-size:38px;margin-bottom:8px}

  .attach-view{display:flex;align-items:center;gap:9px;padding:9px 11px;background:var(--c-postado-bg);border-radius:9px;font-size:12px;font-weight:600;color:var(--c-postado);margin-top:8px}
  .status-flag{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;display:inline-flex;align-items:center;gap:5px}
  .sf-producao{background:var(--c-trabalho-bg);color:var(--c-trabalho)}
  .sf-postado{background:var(--c-postado-bg);color:var(--c-postado)}
  .sf-atraso{background:var(--c-limite-bg);color:var(--c-limite)}

  @media(max-width:760px){
    .cell{min-height:104px}
    .month-label{min-width:120px;font-size:14px}
    .legend{gap:6px}
    .weekday{font-size:10px}
    .daynum{font-size:12px}
    .big-ev-icon{font-size:20px}
    .big-ev-title{font-size:11px}
    .big-ev-type{display:none}
    .big-flag{font-size:9px;padding:2px 6px}
    .big-ev-extras{font-size:10px}
    .row2{grid-template-columns:1fr}
    /* produtos: em telas estreitas, nome em cima e código/fornecedor embaixo */
    .prod-list-head{display:none}
    .prod-row{grid-template-columns:34px 1fr 30px 30px;grid-auto-rows:auto}
    .prod-row .p-name{grid-column:2 / -1}
    .prod-row .p-code{grid-column:2 / 3}
    .prod-row .p-supplier{grid-column:3 / -1}
    .prod-row .prod-thumb{grid-row:1 / 3}
    .prod-row .p-note-btn{grid-column:3;grid-row:1}
    .prod-row .prod-del{grid-column:4;grid-row:1}
  }
  #toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;
    box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:.25s;z-index:200;max-width:90vw;text-align:center}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast.err{background:var(--c-limite)}
  .prod-thumb.uploading{animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
  a.attach-view{text-decoration:none;cursor:pointer}
  a.attach-view:hover{filter:brightness(.97)}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <img class="brand-logo" id="brandLogo" alt="Miashop">
    <div class="brand-txt">
      <h1>Marketing Miashop</h1>
      <p>Agenda de lançamentos e campanhas</p>
    </div>
  </div>
  <div class="nav">
    <button class="today-btn" onclick="goToday()">Hoje</button>
    <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" onclick="changeMonth(1)">›</button>
    <button class="add-btn" onclick="openForm(todayStr())"><span>+</span> Novo projeto</button>
  </div>
</div>

<div class="legend" id="legend">
  <span class="legend-title">Cores do dia</span>
</div>

<div class="cal-wrap">

<script>
/* ============ Estado ============ */
const MONTHS=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
// imagens dos ícones (data URLs) — injetadas abaixo
const TYPE_IMAGES=window.__TYPE_IMAGES__||{};
const DEFAULT_TYPES={
  stories:{icon:'📸',img:TYPE_IMAGES.stories||'',label:'Stories'},
  feed:{icon:'🖼️',img:TYPE_IMAGES.feed||'',label:'Feed'},
  reels:{icon:'🎬',label:'Reels'},
  precos:{icon:'🏷️',img:TYPE_IMAGES.precos||'',label:'Artes de preço'},
};
const DEFAULT_COLOR_LABELS={trabalho:'Em produção',postado:'Postado',limite:'Atrasado'};
const COLOR_KEYS=['trabalho','postado','limite'];

/* ============ Nuvem (Google Apps Script) ============ */
const API_KEY='mkt_api_url';
let API_URL=localStorage.getItem(API_KEY)||'';

let TYPES=JSON.parse(JSON.stringify(DEFAULT_TYPES));
let COLOR_LABELS=JSON.parse(JSON.stringify(DEFAULT_COLOR_LABELS));
let events=[];   // {id,date,title,types:[..],notes,products:[{name,code,supplier,photo,notes}],attachment,status}
let view=new Date();
let editingId=null;

// chamada genérica à API (GET para ler, POST para gravar)
async function api(action,payload){
  if(!API_URL)throw new Error('Sistema não configurado');
  if(action==='load'){
    const r=await fetch(API_URL+'?action=load',{method:'GET'});
    const j=await r.json();
    if(!j.ok)throw new Error(j.error||'Erro ao carregar');
    return j.data;
  }
  // POST (save/delete/uploadPhoto/saveConfig) — text/plain evita preflight CORS
  const r=await fetch(API_URL,{
    method:'POST',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify(Object.assign({action},payload||{})),
  });
  const j=await r.json();
  if(!j.ok)throw new Error(j.error||'Erro na operação');
  return j.data;
}

// grava um projeto na nuvem
async function cloudSaveEvent(ev){ return api('save',{event:ev}); }
// exclui um projeto na nuvem
async function cloudDeleteEvent(id){ return api('delete',{id}); }
// grava uma configuração (tipos, rótulos de cor)
async function cloudSaveConfig(key,value){ return api('saveConfig',{key,value}); }
// envia foto/anexo para o Drive e devolve URL pública
async function cloudUploadPhoto(dataUrl,name){ return api('uploadPhoto',{dataUrl,name}); }

// aplica ícones padrão sobre os tipos vindos da nuvem
function fixTypeIcons(){
  Object.keys(DEFAULT_TYPES).forEach(k=>{
    if(TYPES[k]){ TYPES[k].img=DEFAULT_TYPES[k].img; }
    else{ TYPES[k]=JSON.parse(JSON.stringify(DEFAULT_TYPES[k])); }
  });
}

// carrega tudo da nuvem
async function loadFromCloud(){
  const data=await api('load');
  events=(data.events||[]).map(ev=>{
    // compatibilidade com formato antigo
    if(!ev.types){ ev.types=ev.type?[ev.type]:['feed']; delete ev.type; }
    return ev;
  });
  const cfg=data.config||{};
  if(cfg.TYPES) TYPES=cfg.TYPES;
  if(cfg.COLOR_LABELS) COLOR_LABELS=cfg.COLOR_LABELS;
  fixTypeIcons();
}

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function pad(n){return String(n).padStart(2,'0')}
function dstr(d){return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate())}
function todayStr(){return dstr(new Date())}
function fmtBR(s){if(!s)return'';const[y,m,d]=s.split('-');return d+'/'+m+'/'+y}

// retorna os tipos de um evento (array de {icon,label}); compatível com formato antigo (ev.type)
function evTypes(ev){
  const keys=ev.types||(ev.type?[ev.type]:[]);
  const out=keys.map(k=>TYPES[k]).filter(Boolean);
  return out.length?out:[{icon:'📌',label:'Projeto'}];
}
// HTML do ícone de um tipo: imagem se houver, senão emoji
function typeIcon(t,size){
  size=size||18;
  if(t&&t.img)return `<img class="type-img" src="${t.img}" style="width:${size}px;height:${size}px" alt="">`;
  return `<span>${t?t.icon:'📌'}</span>`;
}

// gera lista de datas (YYYY-MM-DD) entre start e end, inclusive
function dateRange(start,end){
  if(!start||!end)return [];
  const out=[];
  let d=new Date(start+'T00:00'), last=new Date(end+'T00:00');
  if(d>last)return [];
  while(d<=last){out.push(dstr(d));d.setDate(d.getDate()+1)}
  return out;
}

/* ============ Cores automáticas por projeto ============
   Colore apenas o dia da postagem:
   - amarelo (em produção): ainda não postado e a data ainda não passou
   - verde (postado): marcado como postado
   - vermelho (atrasado): passou da data de postagem sem marcar postado
   Prioridade quando há mais de um projeto no mesmo dia:
   atrasado (vermelho) > postado (verde) > produção (amarelo)
*/
function computeAutoColors(){
  const PRIO={limite:3,postado:2,trabalho:1};
  const map={};
  const today=todayStr();
  events.forEach(ev=>{
    const d=ev.date;
    if(!d)return;
    let color;
    if(ev.status==='postado')color='postado';   // verde
    else if(d<today)color='limite';              // vermelho (atrasado)
    else color='trabalho';                       // amarelo (em produção)
    if(!map[d]||PRIO[color]>PRIO[map[d]])map[d]=color;
  });
  return map;
}

/* ============ Render calendário ============ */
function render(){
  const y=view.getFullYear(), m=view.getMonth();
  document.getElementById('monthLabel').textContent=MONTHS[m]+' '+y;
  const first=new Date(y,m,1), startDow=first.getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const prevDays=new Date(y,m,0).getDate();
  const grid=document.getElementById('grid'); grid.innerHTML='';
  const today=todayStr();

  const cells=[];
  for(let i=startDow-1;i>=0;i--)cells.push({day:prevDays-i,out:true,date:dstr(new Date(y,m-1,prevDays-i))});
  for(let d=1;d<=daysInMonth;d++)cells.push({day:d,out:false,date:dstr(new Date(y,m,d))});
  const rem=(7-cells.length%7)%7;
  for(let d=1;d<=rem;d++)cells.push({day:d,out:true,date:dstr(new Date(y,m+1,d))});

  const autoColors=computeAutoColors();

  cells.forEach(c=>{
    const cell=document.createElement('div');
    cell.className='cell'+(c.out?' out':'');
    if(c.date===today && !c.out)cell.classList.add('today');
    // cores aplicadas automaticamente pelos projetos
    const color=autoColors[c.date];
    if(color && !c.out){cell.classList.add('marked','m-'+color)}

    const head=document.createElement('div');
    head.className='cell-head';
    head.innerHTML=`<span class="daynum">${c.day}</span>`;
    if(!c.out){
      const actions=document.createElement('div');
      actions.className='cell-actions';
      const bAdd=document.createElement('button');bAdd.className='mini-btn';bAdd.textContent='+';bAdd.title='Novo projeto';
      bAdd.onclick=(e)=>{e.stopPropagation();openForm(c.date)};
      actions.append(bAdd);
      head.append(actions);
    }
    cell.append(head);

    if(!c.out){
      const dayEvents=events.filter(ev=>ev.date===c.date);
      if(dayEvents.length===1){
        // 1 projeto por dia: card grande ocupando a célula
        const ev=dayEvents[0];
        const tps=evTypes(ev);
        const overdue=ev.status!=='postado' && ev.date<today;
        const statusCls=ev.status==='postado'?'is-postado':(overdue?'is-atraso':'is-producao');
        const nprod=(ev.products||[]).length;
        let flag='';
        if(ev.status==='postado')flag='<span class="big-flag">✅ Postado</span>';
        else if(overdue)flag='<span class="big-flag">⚠️ Atrasado</span>';
        else flag='<span class="big-flag">🛠️ Em produção</span>';
        const extras=[];
        if(nprod)extras.push(`📦 ${nprod}`);
        if(ev.notes)extras.push('📝');
        if(ev.attachment)extras.push('📎');
        const icons=tps.map(t=>typeIcon(t,26)).join('');
        const labels=tps.map(t=>t.label).join(' + ');
        const bigEv=document.createElement('button');
        bigEv.className='big-ev '+statusCls;
        bigEv.innerHTML=`
          <span class="big-ev-icon">${icons}</span>
          <span class="big-ev-title">${esc(ev.title)}</span>
          <span class="big-ev-type">${esc(labels)}</span>
          ${flag}
          ${extras.length?`<span class="big-ev-extras">${extras.join(' · ')}</span>`:''}`;
        bigEv.onclick=(e)=>{e.stopPropagation();openDay(c.date)};
        cell.append(bigEv);
      }else if(dayEvents.length>1){
        // fallback: mais de um projeto no mesmo dia (faixas compactas)
        const evBox=document.createElement('div');evBox.className='events';
        dayEvents.slice(0,3).forEach(ev=>{
          const icons=evTypes(ev).map(t=>typeIcon(t,13)).join('');
          const overdue=ev.status!=='postado' && ev.date<today;
          const b=document.createElement('button');
          b.className='ev'+(ev.status==='postado'?' type-postado':(overdue?' type-limite':''));
          let badges='';
          if(ev.attachment)badges+='<span class="ev-badge">📎</span>';
          if(ev.status==='postado')badges+='<span class="ev-badge">✅</span>';
          else if(overdue)badges+='<span class="ev-badge">⚠️</span>';
          b.innerHTML=`<span class="ev-icon">${icons}</span>
            <span class="ev-name">${esc(ev.title)}</span>
            <span class="ev-badges">${badges}</span>`;
          b.onclick=(e)=>{e.stopPropagation();openDay(c.date)};
          evBox.append(b);
        });
        if(dayEvents.length>3){
          const more=document.createElement('div');more.className='ev-more';more.textContent='+'+(dayEvents.length-3)+' mais';
          evBox.append(more);
        }
        cell.append(evBox);
      }
      cell.onclick=()=>openDay(c.date);
    }
    grid.append(cell);
  });
}
function esc(s){return(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

/* ============ Navegação ============ */
function changeMonth(d){view.setMonth(view.getMonth()+d);render()}
function goToday(){view=new Date();render()}

/* ============ Detalhe do dia ============ */
function openDay(date){
  const dayEvents=events.filter(ev=>ev.date===date);
  let body='';
  if(dayEvents.length===0){
    body+=`<div class="empty-day"><div class="big">🗓️</div><p>Nenhum projeto neste dia.</p></div>`;
  }else{
    dayEvents.forEach(ev=>{
      const tps=evTypes(ev);
      const icons=tps.map(t=>typeIcon(t,20)).join('');
      const labels=tps.map(t=>t.label).join(' + ');
      let meta='';
      meta+=`<span class="meta-tag" style="color:var(--brand-ink)">📅 Postagem: ${fmtBR(ev.date)}</span>`;
      let prods='';
      (ev.products||[]).forEach(p=>{
        const img=p.photo?`<img src="${p.photo}">`:`<div class="dp-ph">📦</div>`;
        const sub=[p.code?'Cód: '+esc(p.code):'',p.supplier?esc(p.supplier):''].filter(Boolean).join(' · ');
        const pnotes=p.notes?`<div class="dp-notes">📝 ${esc(p.notes)}</div>`:'';
        prods+=`<div class="dp"><div class="dp-top">${img}<div class="dp-info"><strong>${esc(p.name)||'Produto sem nome'}</strong><small>${sub||'—'}</small></div></div>${pnotes}</div>`;
      });
      // status atual do projeto (para o selo)
      const today=todayStr();
      let sf;
      if(ev.status==='postado')sf=`<span class="status-flag sf-postado">✅ Postado</span>`;
      else if(ev.date<today)sf=`<span class="status-flag sf-atraso">⚠️ Atrasado</span>`;
      else sf=`<span class="status-flag sf-producao">🛠️ Em produção</span>`;
      const attach=ev.attachment
        ?(ev.attachment.url
          ?`<a class="attach-view" href="${ev.attachment.url}" target="_blank" rel="noopener">📎 ${esc(ev.attachment.name)} <span style="margin-left:auto">abrir ↗</span></a>`
          :`<div class="attach-view">📎 ${esc(ev.attachment.name)} <span style="margin-left:auto">${ev.attachment.size||''}</span></div>`)
        :'';
      const postBtn=ev.status==='postado'
        ?`<button class="btn btn-ghost" onclick="unmarkPosted('${ev.id}','${date}')">↩️ Desmarcar postado</button>`
        :`<button class="btn btn-primary" onclick="markPosted('${ev.id}','${date}')">✅ Marcar postado</button>`;
      body+=`<div class="detail-ev">
        <div class="detail-ev-head">
          <div class="detail-ev-icon">${icons}</div>
          <div style="flex:1">
            <div class="detail-ev-title">${esc(ev.title)}</div>
            <div style="font-size:12px;color:var(--muted);margin-top:2px">${esc(labels)}</div>
          </div>
          ${sf}
        </div>
        ${meta?`<div class="detail-meta">${meta}</div>`:''}
        ${ev.notes?`<div class="ev-notes">📝 ${esc(ev.notes)}</div>`:''}
        ${prods?`<div class="detail-prods">${prods}</div>`:''}
        ${attach}
        <div class="detail-actions">
          ${postBtn}
          <button class="btn btn-ghost" onclick="openForm('${ev.date}','${ev.id}')">✏️ Editar</button>
          <button class="btn btn-danger" onclick="delEvent('${ev.id}','${date}')">🗑️ Excluir</button>
        </div>
      </div>`;
    });
  }
  const modal=document.getElementById('modal');
  modal.innerHTML=`
    <div class="modal-head">
      <h2>🗓️ ${fmtBR(date)}<span class="date-sub"> · ${['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'][new Date(date+'T00:00').getDay()]}</span></h2>
      <button class="close-x" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">${body}</div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Fechar</button>
      <button class="btn btn-primary" onclick="openForm('${date}')">+ Novo projeto</button>
    </div>`;
  document.getElementById('overlay').classList.add('show');
}

async function markPosted(id,date){
  const ev=events.find(e=>e.id===id); if(!ev)return;
  ev.status='postado';render();openDay(date);
  try{ await cloudSaveEvent(ev); }catch(e){ toast('Erro ao salvar: '+e.message,true); }
}
async function unmarkPosted(id,date){
  const ev=events.find(e=>e.id===id); if(!ev)return;
  ev.status=null;render();openDay(date);
  try{ await cloudSaveEvent(ev); }catch(e){ toast('Erro ao salvar: '+e.message,true); }
}
async function delEvent(id,date){
  if(!confirm('Excluir este projeto?'))return;
  events=events.filter(e=>e.id!==id);
  const remaining=events.filter(ev=>ev.date===date);
  remaining.length?openDay(date):closeModal();
  render();
  try{ await cloudDeleteEvent(id); }catch(e){ toast('Erro ao excluir: '+e.message,true); }
}

/* ============ Formulário ============ */
let formProducts=[], formAttachment=null, formTypes=[];
let pendingFormDate=null, formDraft={};

function openForm(date,id){
  editingId=id||null;
  let ev=id?events.find(e=>e.id===id):null;
  formProducts=ev?JSON.parse(JSON.stringify(ev.products||[])):[];
  formAttachment=ev?ev.attachment||null:null;
  formTypes=ev?(ev.types?ev.types.slice():(ev.type?[ev.type]:[])):[];
  pendingFormDate=date;
  formDraft={
    title:ev?ev.title:'',
    date:ev?ev.date:date,
    notes:ev?ev.notes||'':'',
  };
  buildFormShell(date);
}

// captura o que está digitado antes de trocar de tela (ex: abrir editor de tipo)
function captureFormDraft(){
  const g=id=>{const el=document.getElementById(id);return el?el.value:''};
  if(!document.getElementById('f-title'))return;
  formDraft={
    title:g('f-title'),date:g('f-date'),notes:g('f-notes'),
  };
}

function buildFormShell(date){
  const modal=document.getElementById('modal');
  const d=formDraft;
  modal.innerHTML=`
    <div class="modal-head">
      <h2>${editingId?'✏️ Editar projeto':'📣 Novo projeto'}</h2>
      <button class="close-x" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Nome do projeto / campanha</label>
        <input type="text" id="f-title" placeholder="Ex: Lançamento coleção inverno" value="${esc(d.title)}">
      </div>

      <div class="field">
        <label style="display:flex;align-items:center;justify-content:space-between">Tipo de projeto <span class="opt" style="font-weight:500">selecione um ou mais · clique 2× p/ editar</span></label>
        <div class="type-pick" id="typePick"></div>
      </div>

      <div class="field">
        <label>Data de postagem</label>
        <input type="date" id="f-date" value="${d.date}">
      </div>

      <div class="field">
        <label>Observações <span class="opt">(opcional)</span></label>
        <textarea id="f-notes" placeholder="Briefing geral, instruções, referências do projeto...">${esc(d.notes||'')}</textarea>
      </div>

      <div class="field prod-field">
        <label class="prod-label">📦 Produtos do lançamento <span class="opt">(todos os campos opcionais)</span></label>
        <div class="prod-list" id="prodList"></div>
        <button type="button" class="add-prod" onclick="addProduct()"><span>+</span> Adicionar produto</button>
      </div>

      <div class="field">
        <label>Projeto pronto p/ aprovação <span class="opt">(opcional)</span></label>
        <div class="attach-zone" onclick="document.getElementById('f-attach').click()">
          <div class="attach-ico">📎</div>
          <div class="attach-txt"><strong>Anexar arquivo</strong><small>Imagem, PDF, vídeo — o que estiver pronto</small></div>
        </div>
        <input type="file" id="f-attach" style="display:none" onchange="handleAttach(this)">
        <div id="attachPreview"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveForm('${date}')">${editingId?'Salvar alterações':'Criar projeto'}</button>
    </div>`;
  renderTypePicker();
  renderProducts();
  renderAttach();
  document.getElementById('overlay').classList.add('show');
}
function renderTypePicker(){
  const box=document.getElementById('typePick');if(!box)return;
  box.innerHTML=Object.entries(TYPES).map(([k,v])=>{
    const on=formTypes.includes(k);
    return `<button type="button" class="type-opt ${on?'active':''}" data-type="${k}" onclick="pickType('${k}')" ondblclick="editType('${k}')" title="Clique p/ selecionar · 2× p/ editar"><span class="tico">${typeIcon(v,16)}</span>${esc(v.label)}${on?'<span class="type-check">✓</span>':''}</button>`;
  }).join('')+
    `<button type="button" class="type-opt type-new" onclick="editType(null)"><span class="tico">＋</span>Novo tipo</button>`;
}
function pickType(t){
  const i=formTypes.indexOf(t);
  if(i>=0)formTypes.splice(i,1); else formTypes.push(t);
  renderTypePicker();
}

/* editor de tipos (ícone + nome) */
function editType(key){
  captureFormDraft();
  const existing=key?TYPES[key]:{icon:'',label:''};
  const isNew=!key;
  const emojis=['🚀','📢','✅','🎬','🏷️','✏️','🎯','💥','🔥','⭐','🎁','📸','🛍️','💰','📅','🎉','💡','📦','🖼️','🎨','📝','🏆','❤️','🌟'];
  const modal=document.getElementById('modal');
  modal.innerHTML=`
    <div class="modal-head">
      <h2>${isNew?'➕ Novo tipo de campanha':'✏️ Editar tipo'}</h2>
      <button class="close-x" onclick="reopenForm()">×</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Nome do tipo</label>
        <input type="text" id="t-label" placeholder="Ex: Live de vendas" value="${esc(existing.label)}" maxlength="30">
      </div>
      <div class="field">
        <label>Ícone</label>
        <input type="text" id="t-icon" placeholder="Cole um emoji ou escolha abaixo" value="${esc(existing.icon)}" maxlength="4" style="font-size:20px;text-align:center">
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px">
          ${emojis.map(e=>`<button type="button" onclick="document.getElementById('t-icon').value='${e}'" style="width:38px;height:38px;font-size:19px;border:1px solid var(--line);border-radius:9px;background:var(--paper)">${e}</button>`).join('')}
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <div>${!isNew && !DEFAULT_TYPES[key]?`<button class="btn btn-danger" onclick="deleteType('${key}')">🗑️ Excluir tipo</button>`:''}</div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost" onclick="reopenForm()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveType('${key||''}')">Salvar</button>
      </div>
    </div>`;
}
function saveType(key){
  const label=document.getElementById('t-label').value.trim();
  const icon=document.getElementById('t-icon').value.trim()||'📌';
  if(!label){alert('Dê um nome ao tipo.');return}
  if(key){TYPES[key]=Object.assign({},TYPES[key],{icon,label})}
  else{const k='t'+uid();TYPES[k]={icon,label};if(!formTypes.includes(k))formTypes.push(k)}
  persistTypes();reopenForm();
}
function deleteType(key){
  if(events.some(e=>(e.types||[]).includes(key))){alert('Há projetos usando este tipo. Troque-os antes de excluir.');return}
  if(!confirm('Excluir este tipo?'))return;
  delete TYPES[key];
  const i=formTypes.indexOf(key);if(i>=0)formTypes.splice(i,1);
  persistTypes();reopenForm();
}
// salva os tipos na nuvem, sem gravar as imagens padrão (elas já vêm no arquivo)
function persistTypes(){
  const clean={};
  Object.keys(TYPES).forEach(k=>{
    const t=TYPES[k];
    clean[k]=DEFAULT_TYPES[k]?{icon:t.icon,label:t.label}:{icon:t.icon,label:t.label,img:t.img||''};
  });
  cloudSaveConfig('TYPES',clean).catch(e=>toast('Erro ao salvar tipos: '+e.message,true));
}
function reopenForm(){
  if(pendingFormDate!==null)buildFormShell(pendingFormDate);
}

function addProduct(){formProducts.push({name:'',code:'',supplier:'',photo:'',notes:''});renderProducts();
  // foca o nome do produto recém-adicionado
  setTimeout(()=>{const el=document.getElementById('pname-'+(formProducts.length-1));if(el)el.focus()},30);
}
function renderProducts(){
  const box=document.getElementById('prodList');if(!box)return;
  const header=formProducts.length?`<div class="prod-list-head"><span></span><span>Nome</span><span>Código</span><span>Fornecedor</span><span></span><span></span></div>`:'';
  box.innerHTML=header+formProducts.map((p,i)=>`
    <div class="prod-row">
      <button type="button" class="prod-thumb ${p._uploading?'uploading':''}" onclick="document.getElementById('pphoto-${i}').click()" title="Adicionar foto">
        ${p._uploading?'<span class="ph">⏳</span>':(p.photo?`<img src="${p.photo}">`:`<span class="ph">📷</span>`)}
      </button>
      <input type="file" id="pphoto-${i}" accept="image/*" style="display:none" onchange="handlePhoto(${i},this)">
      <input type="text" class="p-name" id="pname-${i}" placeholder="Nome do produto" value="${esc(p.name)}" oninput="updProduct(${i},'name',this.value)">
      <input type="text" class="p-code" placeholder="Código" value="${esc(p.code)}" oninput="updProduct(${i},'code',this.value)">
      <input type="text" class="p-supplier" placeholder="Fornecedor" value="${esc(p.supplier)}" oninput="updProduct(${i},'supplier',this.value)">
      <button type="button" class="p-note-btn ${p.notes?'has-note':''}" onclick="toggleProdNote(${i})" title="Observações">📝</button>
      <button type="button" class="prod-del" onclick="delProduct(${i})" title="Remover">🗑️</button>
      <textarea class="prod-notes" id="pnote-${i}" style="display:${p.notes?'block':'none'}" placeholder="Observações do produto (opcional)..." oninput="updProduct(${i},'notes',this.value)">${esc(p.notes||'')}</textarea>
    </div>`).join('');
}
function toggleProdNote(i){
  const el=document.getElementById('pnote-'+i);if(!el)return;
  const show=el.style.display==='none';
  el.style.display=show?'block':'none';
  if(show)el.focus();
}
function updProduct(i,k,v){formProducts[i][k]=v}
function delProduct(i){formProducts.splice(i,1);renderProducts()}
function handlePhoto(i,input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async e=>{
    formProducts[i].photo=e.target.result;         // prévia imediata (base64)
    formProducts[i]._uploading=true;renderProducts();
    try{
      const res=await cloudUploadPhoto(e.target.result,f.name);
      formProducts[i].photo=res.url;                // troca por URL do Drive
    }catch(err){ toast('Erro ao enviar foto: '+err.message,true); }
    formProducts[i]._uploading=false;renderProducts();
  };
  r.readAsDataURL(f);
}
function handleAttach(input){
  const f=input.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=async e=>{
    formAttachment={name:f.name,size:fmtSize(f.size),data:e.target.result,uploading:true};renderAttach();
    try{
      const res=await cloudUploadPhoto(e.target.result,f.name);
      formAttachment={name:f.name,size:fmtSize(f.size),url:res.url};
    }catch(err){ toast('Erro ao enviar anexo: '+err.message,true); formAttachment.uploading=false; }
    renderAttach();
  };
  r.readAsDataURL(f);
}
function fmtSize(b){return b<1024?b+' B':b<1048576?(b/1024).toFixed(0)+' KB':(b/1048576).toFixed(1)+' MB'}
function renderAttach(){
  const box=document.getElementById('attachPreview');if(!box)return;
  if(!formAttachment){box.innerHTML='';return;}
  const status=formAttachment.uploading?' <small>(enviando…)</small>':'';
  box.innerHTML=`<div class="attach-file">📄 ${esc(formAttachment.name)} <small>(${formAttachment.size})</small>${status}<span class="rm" onclick="rmAttach()">remover</span></div>`;
}
function rmAttach(){formAttachment=null;renderAttach()}

async function saveForm(origDate){
  const title=document.getElementById('f-title').value.trim();
  const date=document.getElementById('f-date').value;
  if(!title){alert('Dê um nome ao projeto.');return}
  if(!date){alert('Escolha a data de postagem.');return}
  if(formTypes.length===0){alert('Selecione pelo menos um tipo de projeto.');return}
  // limpa campos temporários dos produtos
  const products=formProducts.filter(p=>p.name||p.code||p.supplier||p.photo||p.notes)
    .map(p=>({name:p.name||'',code:p.code||'',supplier:p.supplier||'',photo:p.photo||'',notes:p.notes||''}));
  let attach=formAttachment;
  if(attach){ attach={name:attach.name,size:attach.size,url:attach.url||attach.data||''}; }
  const data={
    title,date,types:formTypes.slice(),
    notes:document.getElementById('f-notes').value.trim(),
    products,attachment:attach,
  };
  let ev;
  if(editingId){
    ev=events.find(e=>e.id===editingId);
    delete ev.type;
    Object.assign(ev,data);
  }else{
    data.id=uid();data.status=null;events.push(data);ev=data;
  }
  closeModal();render();
  try{ await cloudSaveEvent(ev); }catch(e){ toast('Erro ao salvar: '+e.message,true); }
}
function closeModal(){document.getElementById('overlay').classList.remove('show')}
document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeModal()});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

/* ============ Inicialização (nuvem) ============ */
function toast(msg,isErr){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';document.body.appendChild(t);}
  t.textContent=msg;
  t.className=isErr?'show err':'show';
  clearTimeout(t._h);t._h=setTimeout(()=>t.className='',3500);
}

function showSetup(){
  const modal=document.getElementById('modal');
  modal.innerHTML=`
    <div class="modal-head"><h2>☁️ Conectar à nuvem</h2></div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--muted);margin-bottom:14px;line-height:1.6">
        Cole abaixo o <strong>link do aplicativo</strong> que você gerou no Google Apps Script
        (termina em <code>/exec</code>). Ele conecta este sistema à sua planilha e às fotos no Drive.
        O passo a passo está no arquivo <strong>LEIA-ME.txt</strong>.
      </p>
      <div class="field">
        <label>Link do aplicativo (Web App)</label>
        <input type="text" id="setup-url" placeholder="https://script.google.com/macros/s/.../exec" value="${esc(API_URL)}">
      </div>
      <div id="setup-status" style="font-size:13px;margin-top:6px"></div>
    </div>
    <div class="modal-foot">
      <span></span>
      <button class="btn btn-primary" onclick="saveSetup()">Conectar</button>
    </div>`;
  document.getElementById('overlay').classList.add('show');
}

async function saveSetup(){
  const url=document.getElementById('setup-url').value.trim().replace(/\s+/g,'');
  const st=document.getElementById('setup-status');
  if(!/^https:\/\/script\.google\.com\/macros\/s\/.+\/exec$/.test(url)){
    st.innerHTML='<span style="color:var(--c-limite)">Link inválido. Deve terminar em /exec.</span>';return;
  }
  st.innerHTML='Testando conexão…';
  API_URL=url;
  try{
    await api('ping');
    localStorage.setItem(API_KEY,url);
    st.innerHTML='<span style="color:var(--c-postado)">Conectado! Carregando…</span>';
    closeModal();
    await boot();
  }catch(e){
    API_URL='';
    st.innerHTML='<span style="color:var(--c-limite)">Não consegui conectar: '+esc(e.message)+'</span>';
  }
}

async function boot(){
  if(!API_URL){ showSetup(); return; }
  try{
    document.getElementById('monthLabel').textContent='Carregando…';
    await loadFromCloud();
    renderLegend();
    render();
  }catch(e){
    toast('Erro ao carregar dados: '+e.message,true);
    // se falhar (link errado), reabre configuração
    localStorage.removeItem(API_KEY);API_URL='';showSetup();
  }
}

boot();
</script>
